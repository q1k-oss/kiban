name: Deploy to Nexus NPM Registry

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Record start time
        id: start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm registries
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set @happect:registry https://npm.chives.io/repository/npm/
          npm config set //npm.chives.io/repository/npm/:_authToken ${{ secrets.NEXUS_NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate version for tags
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_WITH_V=${GITHUB_REF#refs/tags/}
          TAG_WITHOUT_V=${TAG_WITH_V#v}
          echo "Package version: $PACKAGE_VERSION"
          echo "Tag with v: $TAG_WITH_V"
          echo "Tag without v: $TAG_WITHOUT_V"
          if [ "$PACKAGE_VERSION" = "$TAG_WITH_V" ] || [ "$PACKAGE_VERSION" = "$TAG_WITHOUT_V" ]; then
            echo "Version validation passed!"
          else
            echo "Error: Package version ($PACKAGE_VERSION) does not match tag version ($TAG_WITH_V or $TAG_WITHOUT_V)"
            exit 1
          fi

      - name: Test build
        run: npm run build:compile

      - name: Build package
        run: npm run build:package

      - name: Configure npm for publishing
        run: |
          npm config set @happect:registry https://npm.chives.io/repository/npm/
          npm config set //npm.chives.io/repository/npm/:_authToken ${{ secrets.NEXUS_NPM_TOKEN }}

      - name: Publish to Nexus NPM Registry
        run: npm publish --registry=https://npm.chives.io/repository/npm/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NEXUS_NPM_TOKEN }}

      - name: Verify publication
        run: |
          echo "Package published successfully!"
          echo "Package: @happect/ethereal-ui"
          echo "Registry: https://npm.chives.io/"

      # ✅ Fancy embed Success
      - name: Notify Discord (success)
        if: success()
        uses: Ilshidur/action-discord@master
        with:
          args: |
            {
              "embeds": [
                {
                  "title": "✅ Deployment Successful",
                  "color": 3329330,
                  "fields": [
                    { "name": "Workflow", "value": "${{ github.workflow }}", "inline": true },
                    { "name": "Status", "value": "Success ✅", "inline": true },
                    { "name": "Actor", "value": "${{ github.actor }}", "inline": true },
                    { "name": "Released Version", "value": "$(node -p \"require('./package.json').version\")", "inline": true },
                    { "name": "Git Tag", "value": "${{ github.ref_name }}", "inline": true },
                    { "name": "OS / Runner", "value": "${{ runner.os }} (self-hosted)", "inline": true },
                    { "name": "Duration", "value": "$(($(( $(date +%s) - ${{ steps.start.outputs.start }} ))))s", "inline": true },
                    { "name": "Commit", "value": "`${{ github.sha }}`", "inline": false },
                    { "name": "Message", "value": "$(git log -1 --pretty=%B)" },
                    { "name": "Package", "value": "@happect/ethereal-ui" },
                    { "name": "Registry", "value": "https://npm.chives.io/repository/npm/" },
                    { "name": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" },
                    { "name": "Comparison", "value": "${{ github.server_url }}/${{ github.repository }}/compare/${{ github.sha }}~1...${{ github.sha }}" }
                  ],
                  "footer": {
                    "text": "Nexus Release System"
                  },
                  "timestamp": "${{ github.event.head_commit.timestamp }}"
                }
              ]
            }
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      # ❌ Fancy embed Failure
      - name: Notify Discord on failure
        if: failure()
        uses: Ilshidur/action-discord@master
        with:
          args: |
            {
              "embeds": [
                {
                  "title": "❌ Deployment Failed",
                  "color": 15548997,
                  "fields": [
                    { "name": "Workflow", "value": "${{ github.workflow }}", "inline": true },
                    { "name": "Status", "value": "Failed ❌", "inline": true },
                    { "name": "Actor", "value": "${{ github.actor }}", "inline": true },
                    { "name": "Attempted Version", "value": "$(node -p \"require('./package.json').version\")", "inline": true },
                    { "name": "Git Ref", "value": "${{ github.ref_name }}", "inline": true },
                    { "name": "OS / Runner", "value": "${{ runner.os }} (self-hosted)", "inline": true },
                    { "name": "Duration", "value": "$(($(( $(date +%s) - ${{ steps.start.outputs.start }} ))))s", "inline": true },
                    { "name": "Commit", "value": "`${{ github.sha }}`" },
                    { "name": "Message", "value": "$(git log -1 --pretty=%B)" },
                    { "name": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
                  ],
                  "footer": {
                    "text": "Nexus Release System"
                  },
                  "timestamp": "${{ github.event.head_commit.timestamp }}"
                }
              ]
            }
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

